<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" role="img" aria-labelledby="t1">
  <title id="t1">Stylized Catholic church facade at dusk</title>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2740"/>
      <stop offset="55%" style="stop-color:#243652"/>
      <stop offset="100%" style="stop-color:#152238"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c547"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#sky)"/>
  <ellipse cx="450" cy="480" rx="380" ry="28" fill="#0d1524" opacity="0.45"/>
  <!-- Ground -->
  <rect x="0" y="420" width="900" height="100" fill="#121c2e"/>
  <!-- Church body -->
  <path d="M220 420 L220 260 L280 200 L280 160 L340 120 L450 55 L560 120 L620 160 L620 200 L680 260 L680 420 Z" fill="#1e2d45" stroke="#2a3f5c" stroke-width="2"/>
  <!-- Side wings -->
  <rect x="140" y="300" width="90" height="120" fill="#1a283d" stroke="#2a3f5c" stroke-width="1.5"/>
  <rect x="670" y="300" width="90" height="120" fill="#1a283d" stroke="#2a3f5c" stroke-width="1.5"/>
  <!-- Rose window -->
  <circle cx="450" cy="210" r="52" fill="#0f1828" stroke="url(#gold)" stroke-width="3"/>
  <circle cx="450" cy="210" r="38" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.7"/>
  <g stroke="url(#gold)" stroke-width="1" opacity="0.55" fill="none">
    <line x1="450" y1="158" x2="450" y2="262"/>
    <line x1="398" y1="210" x2="502" y2="210"/>
    <line x1="412" y1="176" x2="488" y2="244"/>
    <line x1="488" y1="176" x2="412" y2="244"/>
  </g>
  <!-- Door -->
  <path d="M400 420 L400 310 Q450 280 500 310 L500 420 Z" fill="#0a101a" stroke="url(#gold)" stroke-width="2"/>
  <!-- Towers -->
  <rect x="250" y="115" width="55" height="145" fill="#243652" stroke="#3d5270" stroke-width="1"/>
  <rect x="595" y="115" width="55" height="145" fill="#243652" stroke="#3d5270" stroke-width="1"/>
  <polygon points="277,115 250,85 305,85" fill="#2c3d56"/>
  <polygon points="622,115 595,85 650,85" fill="#2c3d56"/>
  <!-- Crosses -->
  <g fill="url(#gold)" filter="url(#glow)">
    <rect x="273" y="68" width="8" height="36" rx="1"/>
    <rect x="262" y="78" width="30" height="8" rx="1"/>
    <rect x="618" y="68" width="8" height="36" rx="1"/>
    <rect x="607" y="78" width="30" height="8" rx="1"/>
    <rect x="446" y="28" width="10" height="42" rx="1"/>
    <rect x="432" y="40" width="38" height="10" rx="1"/>
  </g>
  <!-- Windows warm light -->
  <rect x="165" y="330" width="28" height="40" rx="2" fill="#c9a227" opacity="0.35"/>
  <rect x="707" y="330" width="28" height="40" rx="2" fill="#c9a227" opacity="0.35"/>
  <!-- Stars -->
  <g fill="#fff" opacity="0.35">
    <circle cx="120" cy="80" r="1.2"/><circle cx="780" cy="95" r="1"/><circle cx="640" cy="60" r="1.1"/>
    <circle cx="200" cy="55" r="0.9"/><circle cx="520" cy="40" r="1"/><circle cx="90" cy="140" r="0.8"/>
  </g>
</svg>
